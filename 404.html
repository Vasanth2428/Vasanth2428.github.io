<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Vasanthavel K</title>
    <meta name="theme-color" content="#050508" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            background: #050508;
            color: #f0f0f5;
            font-family: 'Space Grotesk', sans-serif;
            text-align: center;
            padding: 24px;
        }

        h1 {
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(90deg, #00e5ff, #ff0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #8a8a9a;
            font-size: 1.1rem;
            max-width: 400px;
        }

        a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            padding: 12px 24px;
            border-radius: 10px;
            background: linear-gradient(135deg, #00e5ff, #ff0080);
            color: #fff;
            font-weight: 600;
            font-size: .9rem;
            text-decoration: none;
            transition: transform .3s, box-shadow .3s;
        }

        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 229, 255, .3);
        }
    </style>
</head>

<body>
    <h1>404</h1>
    <p>This page doesn't exist. But the portfolio does.</p>
    <a href="/">← Back to Portfolio</a>
</body>

</html>
